{% extends "base/base.html" %}

{% block content %}


<form action="" method="post"class="container m-4">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-info fw-bold mt-2">Add</button>
</form>

<hr>


<div class="table-responsive mt-4">
    <table class="table table-dark table-hover">
        <thead>
            <tr>
                <th>Book Name</th>
                <th>Pages</th>
                <th>Date Added</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for b in book %}
            <tr>
                <td>{{ b.book_name }}</td>
                <td>{{ b.total_pages }}</td>
                <td>{{ b.created_at }}</td>
                <td>
                    <a href="#" class="btn btn-sm btn-outline-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock content %}
