{% extends "base/base.html" %}

{% block content %}


<form action="" method="post"class="container m-4">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-info fw-bold mt-2">sell</button>
</form>

<hr>


<div class="table-responsive mt-4">
    <table class="table table-dark table-hover">
        <thead>
            <tr>
                <th>Sell_by</th>
                <th>book</th>
                <th>price</th>
                <th>quantity</th>
                <th>total</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            {% for s in sell %}
            <tr>
                <td>{{ s.sell_by}}</td>
                <td>{{ s.book}}</td>
                <td>{{ s.price}}</td>
                <td>{{ s.quantity}}</td>
                <td>{{ s.total}}</td>
                <td>{{ s.created_at}}</td>
                
                <td>
                    <a href="#" class="btn btn-sm btn-outline-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock content %}
